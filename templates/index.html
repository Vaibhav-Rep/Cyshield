<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyShield - Security Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Background Animation */
    body {
      background: linear-gradient(-45deg, #001a0d, #012d13, #000000, #033d1b);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      font-family: 'Poppins', sans-serif;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating Shield Animation */
    .shield {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    /* Softer Glowing Title Effect */
    .glow-text {
      color: #a7f3d0;
      text-shadow: 0 0 6px #00ff88, 0 0 12px #00cc66, 0 0 18px #008844;
      animation: glowPulse 3s infinite alternate;
    }

    @keyframes glowPulse {
      0% { text-shadow: 0 0 6px #00ff88; }
      100% { text-shadow: 0 0 15px #00cc66; }
    }

    /* Button Glow (slightly dimmer) */
    .glow-btn {
      background-color: #00cc66;
      box-shadow: 0 0 8px #00ff88;
      transition: all 0.3s ease;
    }

    .glow-btn:hover {
      box-shadow: 0 0 15px #00ff88, 0 0 25px #00cc66;
      transform: scale(1.05);
    }
  </style>
</head>

<body class="text-white font-sans">

  <!-- Navbar -->
  <nav class="bg-gray-900/70 backdrop-blur-md p-4 flex justify-between items-center fixed top-0 left-0 w-full shadow-md z-50">
    <div class="flex items-center space-x-2">
      <span class="text-2xl shield">🛡️</span>
      <h1 class="text-xl font-bold text-green-400">CyShield</h1>
    </div>
    <a href="/login" class="px-4 py-2 rounded-lg glow-btn font-semibold">Login</a>
  </nav>

  <!-- Hero Section -->
  <section class="flex flex-col justify-center items-center text-center min-h-screen px-6 pt-20">
    <h2 class="text-5xl font-extrabold mb-4 glow-text">Unified Cybersecurity Platform</h2>
    <p class="text-gray-300 max-w-xl mb-8 text-lg">
      Protect your organization from threats with real-time vulnerability scanning,
      ransomware detection, and ML-powered fraud analysis.
    </p>
    <a href="/login" class="px-8 py-3 rounded-lg text-lg font-semibold glow-btn">Get Started</a>
  </section>

  <!-- Floating Shields -->
  <div class="fixed bottom-10 left-10 text-6xl opacity-10 select-none shield">🛡️</div>
  <div class="fixed top-20 right-20 text-8xl opacity-10 select-none shield">🛡️</div>

  <!-- Footer -->
  <footer class="bg-gray-900/70 backdrop-blur-md text-center p-4 text-sm text-gray-400 fixed bottom-0 left-0 w-full">
    © 2025 <span class="text-green-400 font-semibold">CyShield</span> | Built for Smart Security
  </footer>

</body>

</html>
