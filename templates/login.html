<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyShield - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1e3a8a, #9333ea, #0f172a);
      background-size: 200% 200%;
      animation: moveGradient 6s ease infinite;
      font-family: 'Poppins', sans-serif;
    }

    @keyframes moveGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
      transition: all 0.4s ease;
    }

    .glass:hover {
      transform: scale(1.02);
      box-shadow: 0 0 40px rgba(147, 51, 234, 0.4);
    }

    .glow-btn {
      box-shadow: 0 0 15px #9333ea;
      transition: all 0.3s ease;
    }

    .glow-btn:hover {
      box-shadow: 0 0 25px #a855f7;
      transform: scale(1.05);
    }

    .fade-in {
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Google button styling */
    .google-btn {
      background: white;
      color: #333;
      font-weight: 600;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      transition: all 0.3s ease;
    }

    .google-btn:hover {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

  <div class="glass rounded-2xl p-8 w-96 fade-in">
    <h2 class="text-3xl font-bold text-center mb-2">Welcome Back 👋</h2>
    <p class="text-center text-gray-300 mb-6">Sign in to your CyShield account</p>

    <form action="/login" method="POST" class="space-y-5">
      <div>
        <label class="text-sm font-semibold text-gray-200">Username</label>
        <input type="text" name="username" required placeholder="Enter your username"
          class="w-full p-3 mt-2 rounded-lg bg-gray-800/70 text-white focus:ring-2 focus:ring-purple-500 outline-none transition">
      </div>

      <div>
        <label class="text-sm font-semibold text-gray-200">Password</label>
        <input type="password" name="password" required placeholder="Enter your password"
          class="w-full p-3 mt-2 rounded-lg bg-gray-800/70 text-white focus:ring-2 focus:ring-purple-500 outline-none transition">
      </div>

      <button type="submit"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold glow-btn">
        Login
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-grow h-px bg-gray-600"></div>
      <span class="px-3 text-gray-400 text-sm">or</span>
      <div class="flex-grow h-px bg-gray-600"></div>
    </div>

    <!-- Google Login Button -->
    <a href="/google_login" class="google-btn">
      <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" width="20" height="20">
      Sign in with Google
    </a>

    <div class="text-center mt-5 text-sm">
      <a href="#" class="text-purple-300 hover:underline">Forgot password?</a>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">
      © 2025 CyShield | Secure Access
    </p>
  </div>

</body>
</html>
